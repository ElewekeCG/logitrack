name: LogiTrack CI/CD

on:
    push:
        branches: [ main ]
    pull_request:

env:
    DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@logitrack-db:5432/${{ secrets.POSTGRES_DB }}

jobs:


  # TEST JOBS (RUN IN PARALLEL)
    test-merchant:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./merchant-service
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: npm install
            - name: Run tests
              run: npm test || echo "No tests yet"

    test-rider:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rider-service
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: npm install
            - name: Run tests
              run: npm test || echo "No tests yet"

    test-tracking:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./tracking-service
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: npm install
            - name: Run tests
              run: npm test || echo "No tests yet"

    # BUILD & PUSH 
    build-merchant:
        runs-on: ubuntu-latest
        needs: [test-merchant, test-rider, test-tracking]
        steps:
            - uses: actions/checkout@v4
            - name: Login to Docker Hub
              run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
            - name: Build & Push Merchant Image
              run: |
                docker build -t $DOCKER_USERNAME/merchant-service:${{ github.sha }} \
                            -t $DOCKER_USERNAME/merchant-service:latest \
                            ./merchant-service
                docker push $DOCKER_USERNAME/merchant-service:${{ github.sha }}
                docker push $DOCKER_USERNAME/merchant-service:latest

    build-rider:
        runs-on: ubuntu-latest
        needs: [test-merchant, test-rider, test-tracking]
        steps:
        - uses: actions/checkout@v4
        - name: Login to Docker Hub
          run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
        - name: Build & Push Rider Image
          run: |
            docker build -t $DOCKER_USERNAME/rider-service:${{ github.sha }} \
                        -t $DOCKER_USERNAME/rider-service:latest \
                        ./rider-service
            docker push $DOCKER_USERNAME/rider-service:${{ github.sha }}
            docker push $DOCKER_USERNAME/rider-service:latest

    build-tracking:
        runs-on: ubuntu-latest
        needs: [test-merchant, test-rider, test-tracking]
        steps:
        - uses: actions/checkout@v4
        - name: Login to Docker Hub
          run: echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
        - name: Build & Push Tracking Image
          run: |
            docker build -t $DOCKER_USERNAME/tracking-service:${{ github.sha }} \
                        -t $DOCKER_USERNAME/tracking-service:latest \
                        ./tracking-service
            docker push $DOCKER_USERNAME/tracking-service:${{ github.sha }}
            docker push $DOCKER_USERNAME/tracking-service:latest

    setup-db:
        runs-on: ubuntu-latest
        needs: [build-merchant, build-rider, build-tracking]
        environment: production
        steps:
            - name: Setup DB container
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    # create network if it doesnt exist
                    docker network inspect logitrack-network >/dev/null 2>&1 || \
                    docker network create logitrack-network

                    # start db if not already running
                    if ! docker ps --filter "name=logitrack-db" --filter "status=running" | grep -q logitrack-db; then
                      docker run -d \
                      --name logitrack-db \
                      --network logitrack-network \
                      restart unless-stopped \
                      -e 
                      -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
                      -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
                      -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
                      -v pgdata:/var/lib/postgresql/data \
                      -p 5432:5432 \
                      postgres:15-alpine
                    fi

                    # wait for db to be ready
                    echo "waiting for db..."
                    MAX_TRIES=5
                    for i in $(seq 1 $MAX_TRIES); do
                        if docker exec logitrack-db pg_isready -U ${{ secrets.POSTGRES_USER }}; then
                        echo "db is ready"
                        exit 0
                        fi
                        echo "Attempt $i - database not ready yet, retrying..."
                        sleep 5
                    done
                    echo "db unhealthy"
                    exit 1
  # DEPLOY MERCHANT
    deploy-merchant:
        runs-on: ubuntu-latest
        needs: setup-db          
        environment: production        
        steps:
            - uses: actions/checkout@v4

            - name: Copy scripts to server
              uses: appleboy/scp-action@v0.1.7
              with: 
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                source: "scripts/"
                target: "/home/${{ secrets.DEPLOY_USER }}/scripts/" 

            - name: Deploy Merchant Service
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

                    # tag current running image as stable before replacing it
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/tag_stable.sh merchant-service

                    echo ${{ secrets.DOCKER_PASSWORD }} | \
                    docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

                    docker pull ${{ secrets.DOCKER_USERNAME }}/merchant-service:${{ github.sha }}

                    docker stop merchant-service || true
                    docker rm   merchant-service || true

                    docker run -d \
                    --name merchant-service \
                    --network logitrack-network \
                    --restart unless-stopped \
                    -p 3001:3001 \
                    -e NODE_ENV=production \
                    -e DATABASE_URL=$DATABASE_URL \
                    ${{ secrets.DOCKER_USERNAME }}/merchant-service:${{ github.sha }}

    health-check-merchant:
        runs-on: ubuntu-latest
        needs: deploy-merchant
        steps:
            - uses: actions/checkout@v4
            - name: Wait for Merchant /health
              run: bash scripts/health-check.sh merchant-service 3001
              env:
                DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    rollback-merchant:
        runs-on: ubuntu-latest
        needs: health-check-merchant
        if: failure()
        steps:
            - uses: actions/checkout@v4
            - name: Rollback Merchant
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/rollback.sh merchant-service 3001

  # DEPLOY RIDER
    deploy-rider:
        runs-on: ubuntu-latest
        needs: [build-rider, health-check-merchant]         
        environment: production        
        steps:
            - uses: actions/checkout@v4

            - name: Deploy Rider Service
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

                    # tag current running image as stable before replacing it
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/tag_stable.sh rider

                        echo ${{ secrets.DOCKER_PASSWORD }} | \
                            docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

                        docker pull ${{ secrets.DOCKER_USERNAME }}/rider-service:${{ github.sha }}

                        docker stop rider-service || true
                        docker rm   rider-service || true

                        docker run -d \
                            --name rider-service \
                            --network logitrack-network \
                            --restart unless-stopped \
                            -p 3002:3002 \
                            -e NODE_ENV=production \
                            -e DATABASE_URL=$DATABASE_URL \
                            -e MERCHANT_SERVICE_URL=http://merchant-service:3001 \
                            ${{ secrets.DOCKER_USERNAME }}/rider-service:${{ github.sha }}
    health-check-rider:
        runs-on: ubuntu-latest
        needs: deploy-rider
        steps:
            - uses: actions/checkout@v4
            - name: Wait for Rider /health
              run: bash scripts/health-check.sh rider-service 3002
              env: 
                DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    rollback-rider:
        runs-on: ubuntu-latest
        needs: health-check-rider
        if: failure()
        steps:
            - uses: actions/checkout@v4
            - name: Rollback Rider
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/rollback.sh rider-service 3002

  # DEPLOY TRACKING
    deploy-tracking:
        runs-on: ubuntu-latest
        needs: [build-tracking, health-check-rider]         
        environment: production        
        steps:
            - uses: actions/checkout@v4

            - name: Deploy Tracking Service
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

                    # tag current running image as stable before replacing it
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/tag_stable.sh tracking-service

                    echo ${{ secrets.DOCKER_PASSWORD }} | \
                    docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

                    docker pull ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ github.sha }}

                    docker stop tracking-service || true
                    docker rm   tracking-service || true

                    docker run -d \
                    --name tracking-service \
                    --network logitrack-network \
                    --restart unless-stopped \
                    -p 3003:3003 \
                    -e NODE_ENV=production \
                    -e DATABASE_URL=$DATABASE_URL \
                    -e MERCHANT_SERVICE_URL=http://merchant-service:3001 \
                    -e RIDER_SERVICE_URL=http://rider-service:3002 \
                    ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ github.sha }}

    health-check-tracking:
        runs-on: ubuntu-latest
        needs: deploy-tracking
        steps:
            - uses: actions/checkout@v4
            - name: Wait for Tracking /health
              run: bash scripts/health-check.sh tracking-service 3003
              env:
                DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    rollback-tracking:
        runs-on: ubuntu-latest
        needs: health-check-tracking
        if: failure()
        steps:
            - uses: actions/checkout@v4
            - name: Rollback Tracking
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DEPLOY_HOST }}
                username: ${{ secrets.DEPLOY_USER }}
                key: ${{ secrets.DEPLOY_SSH_KEY }}
                script: |
                    bash /home/${{ secrets.DEPLOY_USER }}/scripts/rollback.sh tracking-service 3003
